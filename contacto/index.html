<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - BLNCRTSHOTS</title>
    <meta name="description" content="Contacta con BLNCRTSHOTS para reservar una sesión fotográfica en Girona.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://blncrtshots.com/contacto/">
    <link rel="icon" type="image/png" href="../assets/images/LogoRaw.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="../" class="logo" aria-label="Ir a la página principal">
                <img src="../assets/images/logo-blncrtshots.png" alt="Logo BLNCRTSHOTS" width="68" height="68">
                <h1>BLNCRTSHOTS</h1>
            </a>
            <ul class="nav-links">
                <li><a href="../">Inicio</a></li>
                <li><a href="../portafolio/">Portafolio</a></li>
                <li><a href="../tarifas/">Tarifas</a></li>
                <li><a href="./">Contacto</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main class="page-main">
        <section class="contact">
            <div class="container">
                <h2>Contacto</h2>
                <div class="contact-content">
                    <div class="contact-info">
                        <div class="contact-item">
                            <i class="bx bx-envelope"></i>
                            <p>blncrtshots@gmail.com</p>
                        </div>
                        <div class="contact-item">
                            <i class="bx bx-map"></i>
                            <p>Girona, España</p>
                        </div>
                    </div>
                    <form class="contact-form" action="https://formsubmit.co/ajax/blncrtshots@gmail.com" method="POST">
                        <input id="contactName" name="Nombre" type="text" placeholder="Nombre" required>
                        <input id="contactEmail" name="Email" type="email" placeholder="Email" required>
                        <textarea id="contactMessage" name="Mensaje" placeholder="Mensaje" required></textarea>
                        <input type="hidden" name="_captcha" value="false">
                        <input type="hidden" name="_subject" value="Nuevo mensaje desde la web">
                        <input type="hidden" name="_template" value="table">
                        <button type="submit">Enviar mensaje</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 BLNCRTSHOTS. Todos los derechos reservados.</p>
            <div class="social-links">
                <a href="https://www.instagram.com/blncrtshots/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                    <i class="bx bxl-instagram"></i>
                </a>
                <a href="https://www.tiktok.com/@blncrtshots" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
                    <i class="bx bxl-tiktok"></i>
                </a>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
</body>
</html>
